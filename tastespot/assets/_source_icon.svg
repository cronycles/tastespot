<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="38%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#FF7248"/>
      <stop offset="100%" stop-color="#BF3010"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="rgba(0,0,0,0.22)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle inner highlight (top-left glow) -->
  <ellipse cx="360" cy="280" rx="340" ry="280" fill="white" opacity="0.06"/>

  <g fill="white" filter="url(#glow)">

    <!-- ══ FORK  (center x = 427) ══ -->
    <!-- Tine 1 -->
    <rect x="382" y="158" width="22" height="200" rx="11"/>
    <!-- Tine 2 -->
    <rect x="416" y="158" width="22" height="200" rx="11"/>
    <!-- Tine 3 -->
    <rect x="450" y="158" width="22" height="200" rx="11"/>
    <!-- Shoulder bar -->
    <rect x="382" y="335" width="90" height="28" rx="14"/>
    <!-- Neck -->
    <rect x="409" y="363" width="36" height="64" rx="18"/>
    <!-- Handle -->
    <rect x="405" y="427" width="44" height="315" rx="22"/>

    <!-- ══ SPOON  (center x = 597) ══ -->
    <!-- Bowl -->
    <ellipse cx="597" cy="246" rx="44" ry="62"/>
    <!-- Neck (tapers from bowl to handle) -->
    <path d="M 573,292 C 570,335 576,365 579,395 L 617,395 C 620,365 626,335 623,292 Z"/>
    <!-- Handle -->
    <rect x="579" y="389" width="36" height="353" rx="18"/>

  </g>

  <!-- ══ Location pin "spot" dot ══ -->
  <circle cx="512" cy="840" r="36" fill="white" opacity="0.90" filter="url(#glow)"/>

</svg>
