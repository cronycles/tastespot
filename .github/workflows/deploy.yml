name: Deploy produzione (backend + web)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'web/**'
      - 'scripts/deploy.sh'
      - '.cpanel.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:   # permette di lanciarlo manualmente da GitHub

jobs:
  deploy:
    name: Build web + Trigger cPanel Git deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web app
        run: |
          npm ci
          npm run build
        working-directory: web

      - name: Commit pre-built dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f web/dist/
          git diff --staged --quiet || git commit -m "chore: update web dist [skip ci]"
          git push

      - name: Pull aggiornamenti nel repo cPanel
        run: |
          RESPONSE=$(curl -k -s -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://crointhemorning.com:2083/execute/VersionControl/update?repository_root=/home/crointhe/repositories/tastespot")
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          echo "HTTP: $HTTP_CODE | Body: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then echo "Errore HTTP $HTTP_CODE" && exit 1; fi

      - name: Aspetta che il git pull sia completato
        run: sleep 15

      - name: Esegui deploy (.cpanel.yml tasks)
        run: |
          RESPONSE=$(curl -k -s -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://crointhemorning.com:2083/execute/VersionControlDeployment/create?repository_root=/home/crointhe/repositories/tastespot")
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then echo "Errore HTTP $HTTP_CODE" && exit 1; fi
          echo "$BODY" | python3 -c "
          import sys, json
          try:
            r = json.load(sys.stdin)
            if r.get('status') == 1:
              print('Deploy completato con successo')
            else:
              print('Deploy fallito:', r)
              sys.exit(1)
          except Exception as e:
            print('Errore parsing risposta:', e)
            sys.exit(1)
          "
