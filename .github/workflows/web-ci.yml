name: Web Artifact Check

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  artifact-check:
    name: Verify prebuilt web artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify dist folder exists
        run: test -d web/dist

      - name: Verify built index exists
        run: test -f web/dist/index.html

      - name: Verify built assets are present
        run: ls -1 web/dist/assets | grep -E '\\.(js|css)$'
