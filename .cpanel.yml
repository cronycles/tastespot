---
deployment:
  tasks:
    - find /home/crointhe/repositories/tastespot/backend -mindepth 1 -maxdepth 1 ! -name storage -exec cp -rf {} /home/crointhe/public_html/tastespot/ \;
    - rm -f /home/crointhe/bin/composer && mkdir -p /home/crointhe/bin && curl -sS https://getcomposer.org/installer | /opt/cpanel/ea-php84/root/usr/bin/php -- --install-dir=/home/crointhe/bin --filename=composer
    - cd /home/crointhe/public_html/tastespot && /opt/cpanel/ea-php84/root/usr/bin/php /home/crointhe/bin/composer install --no-dev --optimize-autoloader --no-interaction
    - cd /home/crointhe/public_html/tastespot && /opt/cpanel/ea-php84/root/usr/bin/php artisan migrate --force
    - cd /home/crointhe/public_html/tastespot && /opt/cpanel/ea-php84/root/usr/bin/php artisan optimize:clear
    - cd /home/crointhe/public_html/tastespot && /opt/cpanel/ea-php84/root/usr/bin/php artisan config:cache
    - cd /home/crointhe/public_html/tastespot && /opt/cpanel/ea-php84/root/usr/bin/php artisan route:cache
    - cd /home/crointhe/public_html/tastespot && /opt/cpanel/ea-php84/root/usr/bin/php artisan storage:link 2>/dev/null || true
    - chmod -R 775 /home/crointhe/public_html/tastespot/storage /home/crointhe/public_html/tastespot/bootstrap/cache
