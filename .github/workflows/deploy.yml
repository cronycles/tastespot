name: Deploy backend → produzione

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.cpanel.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:   # permette di lanciarlo manualmente da GitHub

jobs:
  deploy:
    name: Trigger cPanel Git deploy
    runs-on: ubuntu-latest

    steps:
      - name: Chiama cPanel UAPI per aggiornare e deployare il repo
        run: |
          RESPONSE=$(curl -k -s -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://crointhemorning.com:2083/execute/VersionControl/update?repository_root=/home/crointhe/repositories/tastespot")

          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Errore: il server ha risposto con HTTP $HTTP_CODE"
            exit 1
          fi

          echo "$BODY" | python3 -c "
          import sys, json
          try:
            r = json.load(sys.stdin)
            if r.get('status') == 1:
              print('Deploy completato con successo')
            else:
              print('Deploy fallito:', r)
              sys.exit(1)
          except Exception as e:
            print('Risposta non JSON:', sys.stdin.read() if hasattr(sys.stdin, 'read') else str(e))
            sys.exit(1)
          "
