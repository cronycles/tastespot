---
deployment:
  tasks:
    - find /home/crointhe/repositories/tastespot/backend -mindepth 1 -maxdepth 1 ! -name 'storage' -exec cp -rf '{}' /home/crointhe/public_html/tastespot/ ';'
    - cd /home/crointhe/public_html/tastespot && composer install --no-dev --optimize-autoloader --no-interaction
    - cd /home/crointhe/public_html/tastespot && /usr/local/bin/php artisan migrate --force
    - cd /home/crointhe/public_html/tastespot && /usr/local/bin/php artisan optimize:clear
    - cd /home/crointhe/public_html/tastespot && /usr/local/bin/php artisan config:cache
    - cd /home/crointhe/public_html/tastespot && /usr/local/bin/php artisan route:cache
    - cd /home/crointhe/public_html/tastespot && /usr/local/bin/php artisan storage:link 2>/dev/null || true
    - chmod -R 775 /home/crointhe/public_html/tastespot/storage /home/crointhe/public_html/tastespot/bootstrap/cache
